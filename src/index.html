<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Isometric Strategy Game</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #101218;
      }

      body {
        touch-action: none;
        overscroll-behavior: none;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <main id="app">
      <h1>Isometric Strategy Game</h1>
      <p>Project scaffold ready.</p>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
